<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 指南车拼图游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #ddddaa;
            min-height: 100vh;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 30px;
            background: linear-gradient(180deg, rgba(92,58,30,0.95) 0%, rgba(92,58,30,0.8) 100%);
            border-bottom: 2px solid #8b4513;
            pointer-events: auto;
        }

        header h1 {
            color: #000;
            font-size: 1.6em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .parts-panel {
            position: absolute;
            left: 15px;
            top: 90px;
            width: 200px;
            background: rgba(249,241,227,0.95);
            border: 3px solid #8b4513;
            border-radius: 12px;
            padding: 12px;
            pointer-events: auto;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .parts-panel h2 {
            color: #000;
            font-size: 1.1em;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 8px;
        }

        .part-item {
            background: linear-gradient(145deg, #fff8f0, #f0e0c8);
            border: 2px solid #a0522d;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .part-item:hover {
            transform: scale(1.05);
            border-color: #cd853f;
            box-shadow: 0 4px 12px rgba(139,69,19,0.4);
        }

        .part-item.selected {
            border-color: #228b22;
            box-shadow: 0 0 15px rgba(34,139,34,0.6);
        }

        .part-item.completed {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(80%);
        }

        .part-preview {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #e8d5b5, #d4c4a8);
            border-radius: 6px;
            border: 2px solid #8b4513;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            flex-shrink: 0;
        }

        .part-info h3 {
            color: #5c3a1e;
            font-size: 0.9em;
            margin-bottom: 2px;
        }

        .part-info p {
            color: #8b4513;
            font-size: 0.7em;
        }

        .controls-panel {
            position: absolute;
            right: 15px;
            top: 90px;
            width: 180px;
            background: rgba(249,241,227,0.95);
            border: 3px solid #8b4513;
            border-radius: 12px;
            padding: 12px;
            pointer-events: auto;
        }

        .controls-panel h3 {
            color: #000;
            font-size: 1em;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 6px;
        }

        .btn {
            width: 100%;
            background: linear-gradient(145deg, #8b4513, #a0522d);
            color: white;
            border: none;
            padding: 8px;
            font-size: 0.9em;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 6px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139,69,19,0.4);
        }

        .btn-reset {
            background: linear-gradient(145deg, #5c5c5c, #7a7a7a);
        }

        .btn-primary {
            background: linear-gradient(145deg, #228b22, #32cd32);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34,139,34,0.4);
        }

        .progress-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 380px;
            background: rgba(249,241,227,0.95);
            border: 3px solid #8b4513;
            border-radius: 12px;
            padding: 12px;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e8d5b5;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #a0522d;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #228b22, #32cd32);
            width: 0%;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status-text {
            text-align: center;
            margin-top: 8px;
            color: #5c3a1e;
            font-size: 0.9em;
        }

        .help-panel {
            position: absolute;
            right: 15px;
            bottom: 20px;
            width: 220px;
            background: rgba(249,241,227,0.95);
            border: 3px solid #8b4513;
            border-radius: 12px;
            padding: 12px;
            pointer-events: auto;
        }

        .help-panel h3 {
            color: #5c3a1e;
            font-size: 0.95em;
            margin-bottom: 8px;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 6px;
        }

        .help-panel ul {
            color: #8b4513;
            font-size: 0.8em;
            line-height: 1.6;
            padding-left: 18px;
        }

        .completion-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .completion-modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, #f9f1e3, #e8d5b5);
            border: 4px solid #8b4513;
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            max-width: 480px;
        }

        .modal-content h2 {
            color: #228b22;
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        .modal-content p {
            color: #5c3a1e;
            font-size: 1em;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .modal-content .icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26,26,46,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #f5e6d3;
        }

        #loading h2 {
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(139,69,19,0.3);
            border-top-color: #8b4513;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .place-hint {
            position: absolute;
            background: rgba(34,139,34,0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            pointer-events: none;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <h2>🏮 正在加载 3D 场景...</h2>
        <div class="spinner"></div>
    </div>

    <div id="container">
        <div id="canvas-container"></div>

        <div class="ui-overlay">
            <header>
                <h1>🏮 天工开物 - 指南车 3D 拼装</h1>
            </header>

            <div class="parts-panel">
                <h2>📦 部件列表</h2>
                <div id="partsList"></div>
            </div>

            <div class="controls-panel">
                <h3>🎮 控制</h3>
                <button class="btn btn-reset" id="resetCamera">重置视角</button>
                <button class="btn btn-reset" id="resetGame">重新开始</button>
                <button class="btn btn-primary" id="backToMain">返回主界面</button>
            </div>

            <div class="progress-panel">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <p class="status-text" id="statusText">请选择一个部件开始拼装</p>
            </div>

            <div class="help-panel">
                <h3>📖 操作说明</h3>
                <ul>
                    <li>从部件列表拖拽零件到场景中</li>
                    <li>左键拖动零件移动位置</li>
                    <li>右键拖动旋转视角</li>
                    <li>滚轮缩放视图</li>
                    <li>零件靠近正确位置会自动吸附</li>
                </ul>
            </div>
        </div>

        <div class="completion-modal" id="completionModal">
            <div class="modal-content">
                <div class="icon">🎉</div>
                <h2>拼装完成！</h2>
                <p>恭喜您成功组装了指南车！<br>
                这个古代伟大的机械发明，<br>
                无论车子如何转弯，木人始终指向南方。</p>
                <div class="btn-group">
                    <button class="btn" onclick="closeModal()">继续欣赏</button>
                    <button class="btn btn-reset" onclick="resetGame()">重新拼装</button>
                    <button class="btn btn-primary" onclick="goToMainPage()">返回主页面</button>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
        import * as THREE from './libs/three.module.min.js';
        import { OrbitControls } from './libs/OrbitControls.js';
        
        // ==================== 全局变量 ====================
        let scene, camera, renderer, controls;
        let parts = [];
        let assembledParts = [];
        let selectedPart = null;
        let activePart = null; // 从零件库选中的可拖动零件
        let dragLine = null;
        let raycaster, mouse;
        let dragPlane;
        let guideModel = null;
        const snapDistance = 3.5;
        
        // 零件配置
        const partsConfig = [
            { name: '左车轮', type: 'wheel', target: { x: -1.6, y: 0.65, z: 0 }, color: 0x8B4513 },
            { name: '右车轮', type: 'wheel', target: { x: 1.6, y: 0.65, z: 0 }, color: 0x8B4513 },
            { name: '车轴', type: 'axle', target: { x: 0, y: 0.65, z: 0 }, color: 0x4a3728 },
            { name: '车身', type: 'body', target: { x: 0, y: 1.2, z: 0 }, color: 0xCD853F },
            { name: '立柱', type: 'pole', target: { x: 0, y: 1.7, z: 0 }, color: 0x8B4513 },
            { name: '木人', type: 'figure', target: { x: 0, y: 3.4, z: 0 }, color: 0xDEB887 },
            { name: '车辕', type: 'shaft', target: { x: 0, y: 0.5, z: 1.13 }, color: 0x8B4513 },
            { name: '支撑脚', type: 'support', target: { x: 0, y: 0.6-0.6, z: 0.7+0.5-0.07 }, color: 0x654321 }
        ];
        
        // ==================== 初始化场景 ====================
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xd4c4a8);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 8); // 相机更靠近模型，视觉上放大
            camera.lookAt(0, 2.5, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 10;
            controls.maxDistance = 15;
            controls.maxPolarAngle = Math.PI / 2.1;
            
            addLights();
            addGround();
            
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            
            // 创建参考模型（半透明幽灵版本）
            createGuideModel();
            
            // 创建可交互零件
            createParts();
            updatePartsList();
            initButtons();

            // 隐藏 loading
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
            
            // 添加拖放事件
            const canvasContainer = document.getElementById('canvas-container');
            canvasContainer.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
            });
            
            canvasContainer.addEventListener('drop', (e) => {
                e.preventDefault();
                const partType = e.dataTransfer.getData('partType');
                const partName = e.dataTransfer.getData('partName');
                
                if (partType && partName) {
                    // 找到未组装的对应类型零件
                    const targetPart = parts.find(p => 
                        p.userData.type === partType && !p.userData.isAssembled
                    );
                    
                    if (targetPart && !targetPart.userData.isAssembled) {
                        activePart = targetPart;
                        activePart.visible = true;
                        // 与目标位置保持同一水平线，方便直接对齐
                        const targetY = activePart.userData.targetPosition.y;
                        activePart.position.set(0, targetY, 0);
                        // 设置与参考模型一致的旋转
                        if (activePart.userData.type === 'wheel') {
                            activePart.rotation.y = Math.PI / 2;
                        } else if (activePart.userData.type === 'axle') {
                            activePart.rotation.set(0, 0, Math.PI / 2);
                        } else if (activePart.userData.type === 'shaft' || activePart.userData.type === 'support') {
                            activePart.rotation.y = Math.PI + Math.PI / 2;//此处调整为与参考模型一致的旋转
                        } else {
                            activePart.rotation.set(0, 0, 0);
                        }
                        selectedPart = activePart;
                        controls.enabled = false;
                        createDragLine(selectedPart.position, selectedPart.userData.targetPosition);
                    }
                }
            });
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
            
            animate();
        }
        
        // ==================== 添加光源 ====================
        function addLights() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(10, 15, 10);
            mainLight.castShadow = true;
            scene.add(mainLight);
            
            const fillLight = new THREE.DirectionalLight(0xffeedd, 0.3);
            fillLight.position.set(-10, 5, -5);
            scene.add(fillLight);
        }
        
        // ==================== 添加地面 ====================
        function addGround() {
            const groundGeometry = new THREE.PlaneGeometry(40, 40);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xC8B880,
                roughness: 0.8
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            const gridHelper = new THREE.GridHelper(40, 1, 0x444444, 0x333333);
            gridHelper.position.y = -0.49;
            scene.add(gridHelper);
        }
        
        // ==================== 创建参考模型 ====================
        function createGuideModel() {
            guideModel = new THREE.Group();

            partsConfig.forEach(config => {
                let mesh;
                // 用一个统一的函数创建所有零件，传入不同的材质
                const creatorFunction = (color, material) => {
                    const tempMaterial = material || new THREE.MeshStandardMaterial({ color });
                    switch(config.type) {
                        case 'wheel': return createWheel(color, tempMaterial);
                        case 'body': return createBody(color, tempMaterial);
                        case 'pole': return createPole(color, tempMaterial);
                        case 'figure': return createFigure(color, tempMaterial);
                        case 'shaft': return createShaft(color, tempMaterial);
                        case 'support': return createSupport(color, tempMaterial);
                        case 'axle': return createAxle(color, tempMaterial);
                    }
                };

                mesh = creatorFunction(config.color);
                
                if (mesh) {
                    mesh.userData = { name: config.name, isGuidePart: true };
                    mesh.position.set(config.target.x, config.target.y, config.target.z);
                    const guideColor = config.type === 'axle' ? 0x8B4513 : config.color;
                    const ghostOpacity = config.type === 'axle' ? 0.12 : 0.25;
                    applyGuideGhostStyle(mesh, guideColor, ghostOpacity);
                    disableShadowsForPart(mesh);
                    
                    // 设置与 snapToTarget 中一致的最终旋转
                    if (config.type === 'wheel') {
                        mesh.rotation.y = Math.PI / 2;
                    } else if (config.type === 'axle') {
                        // 注意：CylinderGeometry 默认是沿 Y 轴的，我们创建时旋转了它
                        // 这里要匹配 createAxle 的旋转
                        mesh.rotation.z = Math.PI / 2;
                    } else if (config.type === 'shaft'){
                        mesh.rotation.y = Math.PI / 2;
                        mesh.scale.y = -1;
                        mesh.scale.z = -1;

                    } else if(config.type === 'support'){
                        mesh.rotation.y = Math.PI + Math.PI / 2;
9
                    }
                        /*mesh.rotation.y = Math.PI + Math.PI / 2;
                        mesh.scale.y = -1;
                    } else if(config.type === 'support'){
                        mesh.rotation.y = Math.PI + Math.PI / 2;
                    }*/

                    
                    guideModel.add(mesh);
                }
            });
            
            guideModel.userData = { isGuide: true };
            scene.add(guideModel);
        }

        function applyGuideGhostStyle(root, color, opacity = 0.25) {
            root.traverse((child) => {
                if (!child.isMesh || !child.geometry) return;

                child.material = new THREE.MeshBasicMaterial({
                    color,
                    transparent: true,
                    opacity,
                    depthWrite: false
                });
                child.castShadow = false;
                child.receiveShadow = false;
                child.renderOrder = 1;

                const edges = new THREE.EdgesGeometry(child.geometry);
                const line = new THREE.LineSegments(
                    edges,
                    new THREE.LineBasicMaterial({
                        color,
                        transparent: true,
                        opacity: 0.8
                    })
                );
                line.renderOrder = 2;
                child.add(line);
            });
        }

        function enableShadowsForPart(root) {
            if (!root) return;
            root.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
        }

        function disableShadowsForPart(root) {
            if (!root) return;
            root.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = false;
                    child.receiveShadow = false;
                }
            });
        }
        
        // ==================== 切换参考模型显示 ====================
        window.toggleGuideModel = function() {
            if (guideModel) {
                guideModel.visible = !guideModel.visible;
            }
        };
        
        // ==================== 创建零件 ====================
        function createParts() {
            var guideModel = new THREE.Group();
            const guideMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x000000
            });
            partsConfig.forEach((config, index) => {
                let mesh;
                
                // 统一的创建入口
                const creatorFunction = (color, material) => {
                    // 如果没有提供材质，就创建一个新的标准材质
                    const partMaterial = material || new THREE.MeshStandardMaterial({ 
                        color: color, 
                        roughness: 0.7,
                        metalness: 0.2
                    });

                    switch(config.type) {
                        case 'wheel': mesh = createWheel(color, partMaterial); break;
                        case 'body': mesh = createBody(color, partMaterial); break;
                        case 'pole': mesh = createPole(color, partMaterial); break;
                        case 'figure': mesh = createFigure(color, partMaterial); break;
                        case 'shaft': mesh = createShaft(color, partMaterial); break;
                        case 'support': mesh = createSupport(color, partMaterial); break;
                        case 'axle': mesh = createAxle(color, partMaterial); break;
                    }
                    return mesh;
                };

                mesh = creatorFunction(config.color);
                
                if (mesh) {
                    mesh.userData = {
                        name: config.name,
                        type: config.type,
                        targetPosition: new THREE.Vector3(config.target.x, config.target.y, config.target.z),
                        isAssembled: false,
                        id: index
                    };
                    
                    // 默认隐藏并放到场景外，只有通过零件库拖放后才出现
                    mesh.position.set(0, -1000, 0);
                    mesh.visible = false;
                    
                    // 初始旋转 - 让零件正面朝向玩家
                    // mesh.rotation.set(0, Math.random() * Math.PI, 0);

                    enableShadowsForPart(mesh);
                    
                    scene.add(mesh);
                    parts.push(mesh);
                }
            });
        }
        
        // ==================== 创建车轮 ====================
        function createWheel(color, material) {
            const group = new THREE.Group();
            const partMaterial = material || new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.7,
                metalness: 0.2
            });
            
            // 外胎
            const tireGeometry = new THREE.TorusGeometry(0.7, 0.1, 16, 32);
            const tire = new THREE.Mesh(tireGeometry, partMaterial);
            group.add(tire);
            
            // 轮毂
            const hubGeometry = new THREE.CylinderGeometry(0.12, 0.12, 0.25, 16);
            const hub = new THREE.Mesh(hubGeometry, partMaterial);
            hub.rotation.x = Math.PI / 2;
            group.add(hub);
            
            // 辐条
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const spokeGeometry = new THREE.BoxGeometry(0.04, 0.7, 0.04);
                const spoke = new THREE.Mesh(spokeGeometry, partMaterial);
                
                // 将辐条从中心点向外移动
                spoke.position.set(
                    Math.cos(angle) * 0.35, 
                    Math.sin(angle) * 0.35,
                    0
                );
                // 旋转辐条使其指向外
                spoke.lookAt(0, 0, 0);
                
                group.add(spoke);
            }
            
            // 为了让整个组的旋转中心在车轮中心，并且默认是立着的
            group.rotation.y = -Math.PI / 2;
            
            
            return group;
        }
        
        // ==================== 创建车身 ====================
        function createBody(color, material) {
            const group = new THREE.Group();
            const partMaterial = material || new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.6,
                metalness: 0.1
            });
            
            // 主体
            const bodyGeometry = new THREE.BoxGeometry(2.2, 1, 1.4);
            const body = new THREE.Mesh(bodyGeometry, partMaterial);
            group.add(body);
            
            // 装饰条 - 只在非线框模式下添加
            if (!material || !material.wireframe) {
                const trimMaterial = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
                const trimGeometry = new THREE.BoxGeometry(2.25, 0.06, 0.06);
                const trim1 = new THREE.Mesh(trimGeometry, trimMaterial);
                trim1.position.y = 0.35;
                group.add(trim1);
                const trim2 = new THREE.Mesh(trimGeometry, trimMaterial);
                trim2.position.y = -0.35;
                group.add(trim2);
                
                const topTrimGeo = new THREE.BoxGeometry(0.06, 0.06, 1.45);
                const topTrim1 = new THREE.Mesh(topTrimGeo, trimMaterial);
                topTrim1.position.set(1.08, 0.45, 0);
                group.add(topTrim1);
                const topTrim2 = new THREE.Mesh(topTrimGeo, trimMaterial);
                topTrim2.position.set(-1.08, 0.45, 0);
                group.add(topTrim2);
            }
            
            return group;
        }
        
        // ==================== 创建立柱 ====================
        function createPole(color, material) {
            const group = new THREE.Group();
            const partMaterial = material || new THREE.MeshStandardMaterial({ 
                color: color,
                roughness: 0.5
            });
            
            const poleGeometry = new THREE.CylinderGeometry(0.07, 0.09, 1.7, 16);
            const pole = new THREE.Mesh(poleGeometry, partMaterial);
            pole.position.y = 0.85;
            group.add(pole);
            
            const baseGeometry = new THREE.CylinderGeometry(0.15, 0.2, 0.1, 16);
            const base = new THREE.Mesh(baseGeometry, partMaterial);
            base.position.y = 0;
            group.add(base);
            
            const topGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const top = new THREE.Mesh(topGeometry, partMaterial);
            top.position.y = 1.7;
            group.add(top);
            
            return group;
        }
        
        // ==================== 创建木人 ====================
        function createFigure(color, material) {
            const group = new THREE.Group();
            const partMaterial = material || new THREE.MeshStandardMaterial({ 
                color: color,
                roughness: 0.6
            });
            
            const bodyGeometry = new THREE.CylinderGeometry(0.09, 0.13, 0.45, 12);
            const body = new THREE.Mesh(bodyGeometry, partMaterial);
            group.add(body);
            
            const headGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const head = new THREE.Mesh(headGeometry, partMaterial);
            head.position.y = 0.32;
            group.add(head);

            const armGeometry = new THREE.CylinderGeometry(0.03, 0.03, 0.3, 12);
            const leftArm = new THREE.Mesh(armGeometry, partMaterial);
            leftArm.rotation.z = Math.PI / 2;
            leftArm.position.set(-0.16, 0.18, 0);
            group.add(leftArm);

            /*const rightArm = new THREE.Mesh(armGeometry, partMaterial);
            rightArm.rotation.z = -0.15;
            rightArm.position.set(0.25, 0.16, 0);
            group.add(rightArm);*/
            
            /*const fingerGeometry = new THREE.CylinderGeometry(0.015, 0.015, 0.1, 12);
            const finger = new THREE.Mesh(fingerGeometry, partMaterial);
            finger.rotation.z = -Math.PI / 2;
            finger.position.set(0.42, 0.16, 0);
            group.add(finger);*/
            
            // 装饰物只在非线框模式下显示
            if (!material || !material.wireframe) {
                const robeMaterial = new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.7 });
                const robeGeometry = new THREE.CylinderGeometry(0.07, 0.16, 0.35, 12);
                const robe = new THREE.Mesh(robeGeometry, robeMaterial);
                robe.position.y = -0.4;
                group.add(robe);

                const hatGeometry = new THREE.ConeGeometry(0.12, 0.1, 12);
                const hat = new THREE.Mesh(hatGeometry, robeMaterial);
                hat.position.y = 0.45;
                group.add(hat);
            }
            
            return group;
        }
        
        // ==================== 创建车辕 ====================
        function createShaft(color, material) {
            const group = new THREE.Group();
            const partMaterial = material || new THREE.MeshStandardMaterial({ 
                color: color,
                roughness: 0.5
            });
            
            const curve = new THREE.QuadraticBezierCurve3(
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(-0.7, -0.15, 0),//原-0.7, 0.15, 0
                new THREE.Vector3(-1.4, -0.3, 0)//原-1.4, 0.3, 0
            );
            
            const tubeGeometry = new THREE.TubeGeometry(curve, 20, 0.045, 12, false);
            const shaft = new THREE.Mesh(tubeGeometry, partMaterial);
            group.add(shaft);
            
            const handleGeometry = new THREE.TorusGeometry(0.07, 0.02, 12, 24);
            const handle = new THREE.Mesh(handleGeometry, partMaterial);
            handle.rotation.x = Math.PI/2;
            //handle.position.set(1.33, 0, 0);
            const endPos = curve.getPoint(1);
            handle.position.set(endPos.x, endPos.y, endPos.z);
            group.add(handle);

            //group.rotation.z = Math.PI; // 旋转180度让它朝向正确的方向
            //group.rotation.y = Math.PI / 2; // 旋转180度让它朝向正确的方向
            group.scale.z= -1; // 水平翻转
            //group.rotation.y = -Math.PI; // 旋转180度让它水平放置
            return group;
        }
        
        // ==================== 创建支撑脚 ====================
        function createSupport(color, material) {
            const group = new THREE.Group();
            const partMaterial = material || new THREE.MeshStandardMaterial({ 
                color: color,
                roughness: 0.6
            });
            
            const poleGeometry = new THREE.CylinderGeometry(0.035, 0.035, 0.5, 12);
            const pole = new THREE.Mesh(poleGeometry, partMaterial);
            pole.position.y = 0.25;
            group.add(pole);
            
            const baseGeometry = new THREE.BoxGeometry(0.22, 0.06, 0.1);
            const base = new THREE.Mesh(baseGeometry, partMaterial);
            base.position.y = 0;
            group.add(base);
            
            const barGeometry = new THREE.CylinderGeometry(0.03, 0.03, 0.6, 12);
            const bar = new THREE.Mesh(barGeometry, partMaterial);
            bar.rotation.z = Math.PI / 2 - 0.1;
            bar.position.set(-0.3, 0.5, 0);
            group.add(bar);

            group.position.y = 0.25;
            //旋转180度让它朝向正确的方
            //group.rotation.y = Math.PI ;
            //group.scale.y = -1; // 水平翻转

            
            return group;
        }
        
        // ==================== 创建车轴 ====================
        function createAxle(color, material) {
            const geometry = new THREE.CylinderGeometry(0.05, 0.05, 3.2, 16);
            const partMaterial = material || new THREE.MeshStandardMaterial({ 
                color: color,
                metalness: 0.5,
                roughness: 0.4
            });
            const axle = new THREE.Mesh(geometry, partMaterial);
            // 修正轴的方向，使其沿 X 轴
            axle.rotation.z = Math.PI / 2;
            return axle;
        }
        
        // ==================== 事件处理 ====================
        function getIntersectedPart(intersects) {
            for (let hit of intersects) {
                let obj = hit.object;
                // 向上查找直到找到有 name 的零件
                while (obj && obj !== scene) {
                    if (obj.userData && obj.userData.name) {
                        return obj;
                    }
                    obj = obj.parent;
                }
            }
            return null;
        }
        
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            if (selectedPart) {
                raycaster.setFromCamera(mouse, camera);
                const intersection = new THREE.Vector3();
                if (raycaster.ray.intersectPlane(dragPlane, intersection)) {
                    selectedPart.position.x = intersection.x;
                    selectedPart.position.z = intersection.z;
                    updateDragLine(selectedPart.position, selectedPart.userData.targetPosition);
                }
            }
        }
        
        function onMouseDown(event) {
            if (event.button !== 0) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            // 收集所有可交互零件及其子对象
            const allMeshes = [];
            parts.forEach(part => {
                if (!part.userData.isAssembled) {
                    allMeshes.push(part);
                    part.traverse(child => {
                        if (child.isMesh) {
                            allMeshes.push(child);
                        }
                    });
                }
            });
            
            const intersects = raycaster.intersectObjects(allMeshes, false);
            
            if (intersects.length > 0) {
                const part = getIntersectedPart(intersects);
                
                // 仅允许当前从零件库激活的零件被点击拾取
                if (part && activePart && part === activePart && !part.userData.isAssembled) {
                    selectedPart = part;
                    controls.enabled = false;
                    // 左右车轮和支撑脚不执行抬起动作，避免吸附时出现抬起落下观感。
                    if (selectedPart.userData.type !== 'wheel' && selectedPart.userData.type !== 'support') {
                        selectedPart.position.y = 2;
                    }
                    createDragLine(selectedPart.position, selectedPart.userData.targetPosition);
                }
            }
        }
        
        function onMouseUp() {
            if (selectedPart) {
                const targetPos = selectedPart.userData.targetPosition;
                const distance = selectedPart.position.distanceTo(targetPos);
                
                // 寻找对应的幽灵零件
                const guidePart = guideModel.children.find(child => child.userData.name === selectedPart.userData.name);

                if (guidePart && distance < snapDistance) {
                    snapToTarget(selectedPart, guidePart);
                } else {
                    // 如果没有吸附，则隐藏回零件库等待重新拖动
                    selectedPart.position.set(0, -1000, 0);
                    selectedPart.visible = false;
                }
                
                removeDragLine();
                selectedPart = null;
                activePart = null;
                controls.enabled = true;
            }
        }
        
        // ==================== 吸附到目标位置 ====================
        function snapToTarget(part, guidePart) {
            // 从 guidePart 获取最终的世界坐标和旋转
            const endPos = new THREE.Vector3();
            const endQuat = new THREE.Quaternion();
            const endScale = new THREE.Vector3();

            guidePart.matrixWorld.decompose(endPos, endQuat, endScale);

            // 直接贴合到目标位置，不播放上升再落下的动画
            part.position.copy(endPos);
            part.quaternion.copy(endQuat);

            // 隐藏对应的幽灵模型部分
            guidePart.visible = false;

            part.userData.isAssembled = true;
            assembledParts.push(part);

            updateProgress();
            playSuccessEffect(part);

            if (assembledParts.length === parts.length) {
                setTimeout(showWinMessage, 500);
            }
        }
        
        // ==================== 成功效果 ====================
        function playSuccessEffect(part) {
            const particleCount = 30;
            const particles = [];
            
            for (let i = 0; i < particleCount; i++) {
                const geometry = new THREE.SphereGeometry(0.06, 4, 4);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0xffd700,
                    transparent: true,
                    opacity: 1
                });
                const particle = new THREE.Mesh(geometry, material);
                particle.position.copy(part.position);
                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.25,
                    Math.random() * 0.25,
                    (Math.random() - 0.5) * 0.25
                );
                scene.add(particle);
                particles.push(particle);
            }
            
            let frame = 0;
            function animateParticles() {
                frame++;
                particles.forEach(p => {
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.y -= 0.008;
                    p.material.opacity = 1 - frame / 50;
                });
                
                if (frame < 50) {
                    requestAnimationFrame(animateParticles);
                } else {
                    particles.forEach(p => scene.remove(p));
                }
            }
            
            animateParticles();
        }
        
        // ==================== 更新进度 ====================
        function updateProgress() {
            const percentage = Math.round((assembledParts.length / parts.length) * 100);
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            if (progressFill) {
                progressFill.style.width = percentage + '%';
                progressFill.textContent = percentage + '%';
            }
            if (statusText) {
                const messages = [
                    '请选择一个部件开始拼装',
                    '很好！继续拼装其他部件',
                    '进度过半！加油！',
                    '快要完成了！',
                    '🎉 指南车拼装完成！'
                ];
                statusText.textContent = messages[Math.min(Math.floor(percentage / 25), messages.length - 1)];
            }

            parts.forEach(part => {
                const item = document.querySelector(`.part-item[data-part="${part.userData.name}"]`);
                if (item && part.userData.isAssembled) {
                    item.classList.add('completed');
                }
            });
        }

        // ==================== 更新零件列表 ====================
        function updatePartsList() {
            const container = document.getElementById('partsList');
            if (!container) return;
            container.innerHTML = '';

            const partIcons = {
                'wheel': '⚙️',
                'body': '📦',
                'pole': '🏛️',
                'figure': '🧍',
                'shaft': '🔧',
                'support': '🔩',
                'axle': '🔗'
            };

            partsConfig.forEach(config => {
                const div = document.createElement('div');
                div.className = 'part-item';
                div.setAttribute('data-part', config.name);
                div.setAttribute('data-type', config.type);
                div.setAttribute('draggable', 'true');

                div.innerHTML = `
                    <div class="part-preview">${partIcons[config.type] || '🔲'}</div>
                    <div class="part-info">
                        <h3>${config.name}</h3>
                        <p>点击选择，拖拽到场景</p>
                    </div>
                `;

                // 点击选择零件
                div.addEventListener('click', () => {
                    if (div.classList.contains('completed')) return;

                    document.querySelectorAll('.part-item').forEach(item => item.classList.remove('selected'));
                    div.classList.add('selected');

                    // 找到对应的 3D 零件
                    const part = parts.find(p => p.userData.name === config.name && !p.userData.isAssembled);
                    if (part) {
                        activePart = part;
                        activePart.visible = true;
                        const targetY = activePart.userData.targetPosition.y;
                        activePart.position.set(0, targetY, 0);

                        if (activePart.userData.type === 'wheel') {
                            activePart.rotation.y = Math.PI / 2;
                        } else if (activePart.userData.type === 'axle') {
                            activePart.rotation.set(0, 0, Math.PI / 2);
                        } else if (activePart.userData.type === 'shaft' || activePart.userData.type === 'support') {
                            activePart.rotation.y = Math.PI + Math.PI / 2;
                        } else {
                            activePart.rotation.set(0, 0, 0);
                        }
                        selectedPart = activePart;
                        controls.enabled = false;
                        createDragLine(selectedPart.position, selectedPart.userData.targetPosition);
                    }
                });

                // 拖拽事件
                div.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('partType', config.type);
                    e.dataTransfer.setData('partName', config.name);
                });

                container.appendChild(div);
            });
        }

        // ==================== 初始化按钮事件 ====================
        function initButtons() {
            const resetCameraBtn = document.getElementById('resetCamera');
            const resetGameBtn = document.getElementById('resetGame');
            const backToMainBtn = document.getElementById('backToMain');

            if (resetCameraBtn) {
                resetCameraBtn.addEventListener('click', () => {
                    window.resetCamera();
                });
            }

            if (resetGameBtn) {
                resetGameBtn.addEventListener('click', () => {
                    window.resetGame();
                });
            }

            if (backToMainBtn) {
                backToMainBtn.addEventListener('click', () => {
                    window.goToMainPage();
                });
            }
        }

        // ==================== 渲染零件预览 ====================
        function renderPartPreview(canvas, config) {
            try {
                const previewScene = new THREE.Scene();
                previewScene.background = new THREE.Color(0xddddaa);
                
                const previewCamera = new THREE.PerspectiveCamera(
                    50, 
                    canvas.width / canvas.height, 
                    0.1, 
                    1000
                );
                previewCamera.position.set(2, 1, 2);
                previewCamera.lookAt(0, 0, 0);
                
                const previewRenderer = new THREE.WebGLRenderer({ 
                    canvas: canvas, 
                    antialias: true, 
                    alpha: true 
                });
                previewRenderer.setSize(canvas.width, canvas.height);
                previewRenderer.setPixelRatio(window.devicePixelRatio);
                
                // 添加简单光源
                const light = new THREE.DirectionalLight(0xffffff, 1);
                light.position.set(5, 5, 5);
                previewScene.add(light);
                
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
                previewScene.add(ambientLight);
                
                // 创建零件模型
                let partMesh;
                const partMaterial = new THREE.MeshStandardMaterial({ 
                    color: config.color,
                    roughness: 0.6,
                    metalness: 0.2
                });
                
                switch(config.type) {
                    case 'wheel': partMesh = createWheel(config.color, partMaterial); break;
                    case 'body': partMesh = createBody(config.color, partMaterial); break;
                    case 'pole': partMesh = createPole(config.color, partMaterial); break;
                    case 'figure': partMesh = createFigure(config.color, partMaterial); break;
                    case 'shaft': partMesh = createShaft(config.color, partMaterial); break;
                    case 'support': partMesh = createSupport(config.color, partMaterial); break;
                    case 'axle': partMesh = createAxle(config.color, partMaterial); break;
                }
                
                if (partMesh) {
                    previewScene.add(partMesh);
                }
                
                // 旋转动画
                function animatePreview() {
                    requestAnimationFrame(animatePreview);
                    if (partMesh) {
                        partMesh.rotation.y += 0.02;
                    }
                    previewRenderer.render(previewScene, previewCamera);
                }
                animatePreview();
                
            } catch(e) {
                console.error('预览渲染错误:', e);
            }
        }
        
        // ==================== 显示胜利消息 ====================
        function createDragLine(startPos, targetPos) {
            if (dragLine) {
                scene.remove(dragLine);
                dragLine.geometry.dispose();
                dragLine.material.dispose();
                dragLine = null;
            }

            const points = [
                new THREE.Vector3(startPos.x, startPos.y, startPos.z),
                new THREE.Vector3(targetPos.x, targetPos.y, targetPos.z)
            ];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0xffd700, linewidth: 2 });
            dragLine = new THREE.Line(geometry, material);
            scene.add(dragLine);
        }

        function updateDragLine(startPos, targetPos) {
            if (!dragLine) return;
            const positions = dragLine.geometry.attributes.position.array;
            positions[0] = startPos.x;
            positions[1] = startPos.y;
            positions[2] = startPos.z;
            positions[3] = targetPos.x;
            positions[4] = targetPos.y;
            positions[5] = targetPos.z;
            dragLine.geometry.attributes.position.needsUpdate = true;
        }

        function removeDragLine() {
            if (!dragLine) return;
            scene.remove(dragLine);
            dragLine.geometry.dispose();
            dragLine.material.dispose();
            dragLine = null;
        }

        function showWinMessage() {
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.8;
            document.getElementById('completionModal').classList.add('show');
            createFireworks();
        }

        window.closeModal = function() {
            document.getElementById('completionModal').classList.remove('show');
        };

        window.goToMainPage = function() {
            window.location.href = 'ui.html';
        };
        
        // ==================== 创建烟花效果 ====================
        function createFireworks() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const x = (Math.random() - 0.5) * 12;
                    const y = 4 + Math.random() * 4;
                    const z = (Math.random() - 0.5) * 12;
                    
                    const particleCount = 60;
                    const particles = [];
                    
                    for (let j = 0; j < particleCount; j++) {
                        const geometry = new THREE.SphereGeometry(0.07, 4, 4);
                        const material = new THREE.MeshBasicMaterial({ 
                            color: new THREE.Color().setHSL(Math.random(), 1, 0.5),
                            transparent: true,
                            opacity: 1
                        });
                        const particle = new THREE.Mesh(geometry, material);
                        particle.position.set(x, y, z);
                        particle.userData.velocity = new THREE.Vector3(
                            (Math.random() - 0.5) * 0.35,
                            (Math.random() - 0.5) * 0.35,
                            (Math.random() - 0.5) * 0.35
                        );
                        scene.add(particle);
                        particles.push(particle);
                    }
                    
                    let frame = 0;
                    function animate() {
                        frame++;
                        particles.forEach(p => {
                            p.position.add(p.userData.velocity);
                            p.userData.velocity.y -= 0.004;
                            p.material.opacity = 1 - frame / 80;
                        });
                        
                        if (frame < 80) {
                            requestAnimationFrame(animate);
                        } else {
                            particles.forEach(p => scene.remove(p));
                        }
                    }
                    
                    animate();
                }, i * 400);
            }
        }
        
        // ==================== 窗口大小调整 ====================
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // ==================== 控制函数 ====================
        window.resetCamera = function() {
            camera.position.set(4, 3, 4); // 相机更靠近模型，视觉上放大
            camera.lookAt(0, 2.5, 0);
            controls.target.set(0, 2.5, 0);
            controls.update();
        };
        
        
        window.resetGame = function() {
            controls.autoRotate = false;
            // 1. Remove all meshes, groups, and helpers from the scene.
            // We iterate backwards because removing items can mess up the index.
            for (let i = scene.children.length - 1; i >= 0; i--) {
                const child = scene.children[i];
                if (child.isMesh || child.isGroup || child.isGridHelper) {
                    scene.remove(child);
                }
            }
            
            // 2. Clear data arrays
            parts = [];
            assembledParts = [];
            
            // 3. Hide win message
            const completionModal = document.getElementById('completionModal');
            if (completionModal) {
                completionModal.classList.remove('show');
            }

            // 4. Re-create the scene elements
            addGround();
            createGuideModel();
            createParts();

            // 5. Update UI
            updateProgress();
            updatePartsList();

            // 6. Clear selected states
            document.querySelectorAll('.part-item').forEach(item => {
                item.classList.remove('selected', 'completed');
            });

            // 6. Reset camera to default position
            resetCamera();
        };
        
        // ==================== 启动游戏 ====================
        init();
    </script>
</body>
