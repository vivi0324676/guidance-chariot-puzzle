<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天工开物 - 古代机械</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "宋体", SimSun, serif;
        }

        body {
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            background-blend-mode: overlay;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 4rem;
            color: #8B4513;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 50px;
            margin-top: 50px;
            letter-spacing: 4px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 280px;
            flex-wrap: wrap;
        }

        .card {
            width: 320px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card-img {
            width: 100%;
            height: 290px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #000;
            box-shadow: 
                /*20px 20px 8px rgba(0,0,0,0.3),*/
                22px 22px 1px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            background: #f5f0e6;
            padding: 0px;
        }

        .card-title {
            font-size: 2.0rem;
            font-weight: bold;
            color: #8B4513;
            background: #d2b48c;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 10px 10px 1px rgba(0,0,0,0.2);
        }

        .stars {
            font-size: 1.5rem;
            color: #8B0000;
            margin-bottom: 15px;
        }

        .card-desc {
            font-size: 1.5rem;
            font-weight: bold;
            color: #492207;
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到天工开物</h1>
        <div class="cards">
            <!-- 指南车卡片 -->
            <div class="card" id="card-compass">
                <img src="zhinanche.jpg" alt="指南车" class="card-img">
                <div class="card-title">指南车</div>
                <div class="stars">★★☆</div>
                <p class="card-desc">古代机械定向车，<br>利用齿轮传动保持方向</p>
            </div>

            <!-- 水碓卡片 -->
            <div class="card" id="card-water">
                <img src="shuidui.jpg" alt="水碓" class="card-img">
                <div class="card-title">水碓</div>
                <div class="stars">★★☆</div>
                <p class="card-desc">古代机械水碓，<br>利用水力驱动 + 凸轮杠杆将圆周运动转为往复舂捣</p>
            </div>
        </div>
    </div>

    <script>
        // 点击交互逻辑
        document.getElementById('card-compass').addEventListener('click', () => {
            window.location.href = 'zhinanche_puzzle.html'; // 跳转到指南车拼图页面
        });

        document.getElementById('card-water').addEventListener('click', () => {
            window.location.href = 'shuidui_puzzle.html'; // 跳转到水碓拼图页面
        });
    </script>
</body>
</html>
